name: Test Action
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Test 1: Basic install + init (no source)
  basic:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./
      - run: ./scripts/test.sh

  # Test 2: With source directory (checkout a real skills repo)
  with-source:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: runkids/my-skills
          path: my-skills
      - run: mkdir -p ~/.claude/skills
      - uses: ./
        with:
          source: ./my-skills
          targets: claude
      - run: skillshare sync
      - run: test -L ~/.claude/skills/skillshare/SKILL.md

  # Test 3: Install from remote repo
  with-install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: mkdir -p ~/.claude/skills
      - uses: ./
        with:
          targets: claude
      - run: skillshare install runkids/my-skills --skill skillshare
      - run: skillshare sync
      - run: test -L ~/.claude/skills/skillshare/SKILL.md

  # Test 4: Specific targets + mode
  with-targets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: mkdir -p ~/.claude/skills
      - uses: ./
        with:
          targets: claude
          mode: copy
      - run: grep -q "claude" ~/.config/skillshare/config.yaml

  # Test 5: With git enabled
  with-git:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./
        with:
          git: true
      - run: test -d ~/.config/skillshare/skills/.git

  # Test 6: Git remote (clone skills repo as source)
  with-remote:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: mkdir -p ~/.claude/skills
      - uses: ./
        with:
          remote: https://github.com/runkids/my-skills.git
          targets: claude
      - run: skillshare sync
      - run: test -L ~/.claude/skills/skillshare/SKILL.md

  # Test 7: Pinned version
  pinned-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./
        with:
          version: "0.18.3"
      - run: skillshare version | grep "0.18.3"
